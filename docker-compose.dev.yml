# Local dev stack.
#
#   docker compose -f docker-compose.dev.yml up -d
#
# Then run the reference server against Qdrant:
#
#   cd python
#   pip install -e ".[dev]"
#   XTALENT_QDRANT_URL=http://localhost:6333 uvicorn xtalent.api:app --reload

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: xtalent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  qdrant_storage:
